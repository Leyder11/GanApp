name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Instalar dependencias Flutter
        run: flutter pub get

      - name: Compilar APK
        run: flutter build apk --release

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependencias Functions
        run: cd functions && npm install

      - name: Compilar TypeScript
        run: cd functions && npm run build

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Functions a Firebase
        run: firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Resumen del deploy
        if: success()
        run: |
          echo "## Deploy exitoso" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Proyecto | ${{ secrets.FIREBASE_PROJECT_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rama | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ejecutado por | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fecha | $(date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
