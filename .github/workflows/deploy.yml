name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Instalar dependencias Flutter
        run: flutter pub get

      - name: Compilar APK
        run: flutter build apk --release

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependencias Functions
        run: cd functions && npm install

      - name: Compilar TypeScript
        run: cd functions && npm run build

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Functions a Firebase
        run: firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
